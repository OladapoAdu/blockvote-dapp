<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockVote - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>
    <header>
        <h1>BlockVote</h1>
    </header>

    <div class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
        <div class="glass-card text-center" style="width: 400px;">
            <h2 class="mb-4">Secure Voting</h2>
            <p class="text-secondary mb-4">Connect your MetaMask wallet to verify your identity on the blockchain.</p>
            
            <button id="connectBtn" class="btn btn-web3 w-100">Connect Wallet</button>
            
            <a id="mobileLinkBtn" class="btn btn-success w-100 d-none" href="#">Open in MetaMask App</a>
            
            <div id="walletAddress" class="mt-3 small text-info"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script>
    let provider;
    let signer;
    let contract;

    // Your actual updated contract address
    const contractAddress = "0xD7541FFAB41AB174c892338330CACc13515aA7B5";

    // Minimal ABI needed just to check the admin status
    const contractABI = ["function admin() view returns (address)"];

    const connectBtn = document.getElementById("connectBtn");
    const walletDisplay = document.getElementById("walletAddress");

    connectBtn.addEventListener("click", connectWallet);


    // Mobile device and environment check
    window.addEventListener("DOMContentLoaded", () => {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        // If it's a mobile device AND window.ethereum doesn't exist (meaning they are in standard Chrome/Safari)
        if (isMobile && !window.ethereum) {
            const connectBtn = document.getElementById("connectBtn");
            const mobileLinkBtn = document.getElementById("mobileLinkBtn");
            
            // Hide the broken desktop connect button
            connectBtn.classList.add("d-none");
            
            // Generate the dynamic deep link (removes 'https://' from your current live URL automatically)
            const cleanUrl = window.location.href.replace(/^https?:\/\//, "");
            mobileLinkBtn.href = `https://metamask.app.link/dapp/${cleanUrl}`;
            
            // Show the mobile redirect button
            mobileLinkBtn.classList.remove("d-none");
        }
    });

    async function connectWallet() {
        if (!window.ethereum) {
            alert("MetaMask not detected! Please install it or use an in-app Web3 browser.");
            return;
        }

        connectBtn.disabled = true;
        connectBtn.innerText = "Connecting...";

        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();

            // 🛡️ SEPOLIA NETWORK CHECK & ENFORCEMENT
            // Automatically prompts MetaMask to switch to Sepolia if the user is on the wrong network
            const { chainId } = await provider.getNetwork();
            if (chainId !== 11155111) { 
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: '0xaa36a7' }], // 11155111 in hex format
                    });
                    // Refresh session provider and signer after a successful network switch
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                } catch (switchError) {
                    alert("Please switch your MetaMask network to Sepolia Testnet manually inside your wallet.");
                    connectBtn.disabled = false;
                    connectBtn.innerText = "Connect Wallet";
                    return;
                }
            }
            
            const userAddress = await signer.getAddress();
            walletDisplay.innerText = "Connected: " + userAddress;

            // 🛠️ THE CROSS-DEVICE FIX: Changed 'provider' to 'signer'
            // This ensures external clients and mobile browsers can read the variable securely inside an active user session
            contract = new ethers.Contract(contractAddress, contractABI, signer);
            const realAdminAddress = await contract.admin();

            // Save wallet and authorization state locally
            sessionStorage.setItem("connectedWallet", userAddress.toLowerCase());

            if (userAddress.toLowerCase() === realAdminAddress.toLowerCase()) {
                sessionStorage.setItem("isAdmin", "true");
                window.location.href = "admin.html";
            } else {
                sessionStorage.setItem("isAdmin", "false");
                window.location.href = "voter_page.html";
            }

        } catch (error) {
            console.error("Connection error details:", error);
            alert("Connection failed. Check console.");
            connectBtn.disabled = false;
            connectBtn.innerText = "Connect Wallet";
        }
    }
</script>

</body>
</html>
