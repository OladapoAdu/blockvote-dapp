<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockVote - Cast Your Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

<header>
    <h1>BlockVote</h1>
    <div id="walletDisplay" class="small text-info me-3">Not Connected</div>
    <button id="voterWalletBtn" class="btn btn-web3" onclick="connectWallet()">Connect Wallet</button>
</header>

<div class="container py-5">
    <div class="text-center mb-5">
        <h2 class="display-6 fw-bold">Official Ballots</h2>
        <p class="text-secondary">Select your ballot, pick a candidate, and execute your transaction safely.</p>
    </div>

    <div id="dynamicBallotsContainer">
        <div class="text-center text-secondary">
            <p>Please connect your wallet to load live voting data.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
let provider;
let signer;
let contract;

// ⚠️ UPDATE THIS WITH YOUR NEW DEPLOYED ADDRESS
const contractAddress = "0xD7541FFAB41AB174c892338330CACc13515aA7B5";

const contractABI = [
    "function vote(uint256 ballotId, uint256 candidateId)",
    "function getBallotCount() view returns(uint256)",
    "function getBallot(uint256) view returns(string,uint256,uint256)",
    "function getCandidate(uint256,uint256) view returns(string,uint256)",
    "function hasVoted(uint256,address) view returns(bool)",
    "function isWhitelisted(address) view returns(bool)" // 👈 Added view function
];

async function connectWallet() {
    if (!window.ethereum) {
        alert("Please install MetaMask!");
        return;
    }

    if (typeof ethers === 'undefined') {
        setTimeout(connectWallet, 300);
        return;
    }

    try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, contractABI, signer);

        const userAddress = await signer.getAddress();
        document.getElementById("walletDisplay").innerText = 
            "Connected: " + userAddress.substring(0,6) + "..." + userAddress.substring(userAddress.length - 4);
        
        document.getElementById("voterWalletBtn").style.display = "none";
        
        // 🔒 SECURITY CHECK: Query on-chain mapping state
        const isRegistered = await contract.isWhitelisted(userAddress);
        
        if (!isRegistered) {
            const container = document.getElementById("dynamicBallotsContainer");
            container.innerHTML = `
                <div class="glass-card mx-auto mt-4 text-center border-danger" style="max-width: 650px;">
                    <h3 class="text-danger mb-3">⚠️ Access Restricted</h3>
                    <p class="text-secondary">Your wallet address is not on the official voter registry:</p>
                    <div class="p-2 bg-dark rounded text-info code mb-4 small" style="font-family: monospace;">${userAddress}</div>
                    <hr style="border-color: rgba(255,255,255,0.1)">
                    <h5 class="mt-4 text-light">How to Register:</h5>
                    <p class="text-secondary small text-start px-3">
                        To maintain election security and prevent duplicate entries, this ballot uses a manual verification system. 
                        Please physically present your student ID credentials along with the wallet address shown above to the election coordinator. Once verified, the administrator will instantly whitelist your account.
                    </p>
                </div>`;
            return; // Exit completely to block unauthorized address access
        }
        
        loadAllBallots();
    } catch (error) {
        console.error("Connection sequence failed:", error);
        alert("Connection failed.");
    }
}

document.addEventListener("DOMContentLoaded", () => {
    if (window.ethereum) {
        connectWallet();
    }
});

async function loadAllBallots() {
    if (!contract) return;

    try {
        const totalBallotsBN = await contract.getBallotCount();
        const totalBallots = totalBallotsBN.toNumber();
        const container = document.getElementById("dynamicBallotsContainer");
        
        if (totalBallots === 0) {
            container.innerHTML = `<p class="text-center text-secondary">There are currently no active ballots found on-chain.</p>`;
            return;
        }

        const userAddress = await signer.getAddress();
        let globalHTML = "";

        for (let i = 0; i < totalBallots; i++) {
            const ballot = await contract.getBallot(i);
            const title = ballot[0];
            const endTime = ballot[1].toNumber();
            const candidateCount = ballot[2].toNumber();
            
            const userHasVoted = await contract.hasVoted(i, userAddress);
            const isExpired = (Date.now() / 1000) > endTime;

            let statusBadge = `<span class="badge bg-success">Active</span>`;
            if (isExpired) statusBadge = `<span class="badge bg-danger">Ended</span>`;
            if (userHasVoted) statusBadge = `<span class="badge bg-warning text-dark">Voted</span>`;

            let ballotHTML = `
                <div class="glass-card mb-5 p-4 text-start">
                    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                        <h3 class="h4 mb-0">${title}</h3>
                        <div class="text-end">
                            ${statusBadge}
                            <small class="text-secondary d-block mt-1">Ends: ${new Date(endTime * 1000).toLocaleString()}</small>
                        </div>
                    </div>
                    <div class="row row-cols-1 row-cols-md-3 g-4 justify-content-center">
            `;

            for (let j = 0; j < candidateCount; j++) {
                const candidate = await contract.getCandidate(i, j);
                const candidateName = candidate[0];
                const voteCount = candidate[1].toString();
                const isDisabled = userHasVoted || isExpired;

                ballotHTML += `
                    <div class="col">
                        <div class="border rounded p-3 d-flex flex-column h-100" style="background: rgba(15, 23, 42, 0.3)">
                            <h4 class="h5">${candidateName}</h4>
                            <div class="mt-auto pt-3">
                                <div class="h4 fw-bold text-info mb-3">
                                    ${voteCount} <small style="font-size: 12px; color: gray;">VOTES</small>
                                </div>
                                <button 
                                    class="btn btn-web3 w-100" 
                                    onclick="castVote(${i}, ${j})" 
                                    ${isDisabled ? 'disabled' : ''}>
                                    ${userHasVoted ? 'Voted' : isExpired ? 'Election Closed' : 'Cast Vote'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            ballotHTML += `</div></div>`;
            globalHTML += ballotHTML;
        }

        container.innerHTML = globalHTML;

    } catch (error) {
        console.error("Error pulling ballots from blockchain:", error);
    }
}

async function castVote(ballotId, candidateId) {
    if (!contract) return;

    try {
        const tx = await contract.vote(ballotId, candidateId);
        alert("Transaction broadcasted! Awaiting confirmation...");
        await tx.wait();
        alert("Vote securely added to block registry!");
        loadAllBallots();
    } catch (error) {
        console.error(error);
        if (error.message.includes("You are not a registered voter")) {
            alert("Security Error: This wallet address lacks registration status.");
        } else if (error.message.includes("Already voted")) {
            alert("Security Violation: Already voted.");
        } else {
            alert("Transaction failed.");
        }
    }
}
</script>
</body>
</html>
